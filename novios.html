<section id="seccion-novios" class="bloque" data-aos="fade-up">
    <h2>Nuestra Promesa</h2>

    <div class="tarjetas-container">

        <div class="flip-card" onclick="flip(this)">
            <div class="flip-card-inner">
                <div class="flip-card-front">
                    <img src="img/novio1.jpeg" alt="Diego" class="foto-novio">
                    <h3>Diego</h3>
                    <p>El Novio</p>
                </div>
                <div class="flip-card-back">
                    <p>"Gracias por compartir este día tan especial con nosotros. He encontrado en Rosa Isela mi camino y mi destino."</p>
                </div>
            </div>
        </div>

        <div class="flip-card" onclick="flip(this)">
            <div class="flip-card-inner">
                <div class="flip-card-front">
                    <img src="img/novia1.jpeg" alt="Rosa Isela" class="foto-novio">
                    <h3>Rosa Isela</h3>
                    <p>La Novia</p>
                </div>
                <div class="flip-card-back">
                    <p>"Agradezco a la vida por ponerme en tu camino. Diego, eres mi sueño hecho realidad y mi amor eterno."</p>
                </div>
            </div>
        </div>

    </div>
</section>
