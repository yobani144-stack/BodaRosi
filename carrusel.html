<section id="galeria-fotos" class="bloque" data-aos="zoom-in-up">
    <h2 class="titulo-elegante">Nuestros Momentos</h2>
    
    <div class="swiper mySwiper">
        <div class="swiper-wrapper">
            <div class="swiper-slide" onclick="animarFoto(this, 'brillo')">
                <img src="img/boda1.jpg" alt="Momento 1">
            </div>
            <div class="swiper-slide" onclick="animarFoto(this, 'zoom')">
                <img src="img/boda2.jpg" alt="Momento 2">
            </div>
            <div class="swiper-slide" onclick="animarFoto(this, 'latido')">
                <img src="img/boda3.jpg" alt="Momento 3">
            </div>
            <div class="swiper-slide" onclick="animarFoto(this, 'revelar')">
                <img src="img/boda4.jpg" alt="Momento 4">
            </div>
        </div>
        <div class="swiper-pagination"></div>
    </div>
</section>
