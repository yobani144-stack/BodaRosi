<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitación Especial</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <section id="seccion-sobre">
        <div class="wrapper-sobre" onclick="abrirInvitacion()">
            <div class="flap"></div>
            <div class="letter-preview">
                <h2>Abrir invitación</h2>
            </div>
            <div class="pocket"></div>
        </div>
    </section>

    <section id="seccion-contenido">
        <div class="invitation-main">
            <h1>Diego y Rosa Isela</h1>
            <p>Junto a nuestras familias, tenemos el honor de invitarles a celebrar nuestra unión matrimonial.</p>
            <hr style="width: 50px; border: 1px solid #b5935a; margin: 30px auto;">
            <h3>26 de Diciembre, 2026</h3>
            <p>15:00 Horas</p>
            <p>Yondece del Cedro, San Jose del Rincon, Mexico.</p>
            <button onclick="window.scrollTo({top: 1000, behavior: 'smooth'})" style="margin-top:20px; background:#b5935a; color:white; border:none; padding:10px 20px; border-radius:5px; cursor:pointer;">
                Ver Ubicación
            </button>
                <a href=https://maps.app.goo.gl/MTu72iAhWbbpQQtV7 
   target="_blank" 
   style="display:inline-block; text-decoration:none; margin-top:20px; background:#b5935a; color:white; border:none; padding:10px 20px; border-radius:5px; cursor:pointer; font-family: 'Montserrat', sans-serif; font-weight: 600;">
   Ver Ubicación
</a>
            <div class="boton-container">
    <a href="https://wa.me/527291255411?text=¡Hola!%20Confirmo%20mi%20asistencia%20a%20la%20boda." 
       class="btn-whatsapp" 
       target="_blank">
        <i class="fab fa-whatsapp"></i>
        Confirmar Asistencia
    </a>
</div>
        </div>
    </section>

    <script>
        function abrirInvitacion() {
            const sobreSeccion = document.getElementById('seccion-sobre');
            const contenidoSeccion = document.getElementById('seccion-contenido');

            // 1. Activar animación de apertura del sobre
            sobreSeccion.classList.add('open');

            // 2. Esperar a que la carta suba y luego desvanecer el sobre
            setTimeout(() => {
                sobreSeccion.classList.add('hidden');
                contenidoSeccion.classList.add('show');
                // Habilitar el scroll de la página una vez abierta
                document.body.style.overflow = 'auto';
            }, 1200);
        }

        // Bloquear scroll al inicio hasta que se abra el sobre
        window.onload = () => {
            document.body.style.overflow = 'hidden';
        }
    </script>
</body>
</html>
