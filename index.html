<!DOCTYPE html>
<html lang="es">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boda - Invitación Premium</title>
    
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="contador.css">
     <link rel="stylesheet" href="musica.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>
<body>
        
        <div id="music-control" onclick="toggleMusic(event)">
    <div id="music-bar-container">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
    </div>
</div>

<audio id="musicaBoda" loop>
    <source src="img/perfect.mp3" type="audio/mpeg">
</audio>
    <section id="pantalla-inicio">
        <div class="particles"></div>
        <div class="envelope" id="miSobre" onclick="iniciarApertura()">
            
            <div class="envelope-base"></div>
            
            <div class="flap"></div>
            
            <div class="stamp"></div>
            
            <div class="click-to-open">TOCAR PARA ABRIR</div>
            </div>
        </div>
    </section>

    <main id="invitacion-real">
        
        <section class="bloque" data-aos="fade-up">
            <h1>Diego Y Rosa Isela</h1>
            <p style="letter-spacing: 4px; font-weight: 300;">¡NOS CASAMOS!</p>
        </section>

        <section class="bloque" data-aos="fade-up">
    <h2 class="titulo-contador">Faltan tan solo...</h2>
    <div id="countdown">
        <div class="tiempo">
            <span id="days">00</span>
            <small>Días</small>
        </div>
        <div class="tiempo">
            <span id="hours">00</span>
            <small>Horas</small>
        </div>
        <div class="tiempo">
            <span id="minutes">00</span>
            <small>Minutos</small>
        </div>
        <div class="tiempo">
            <span id="seconds">00</span>
            <small>Segundos</small>
        </div>
    </div>
</section>
    </main>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        function toggleMusic(event) {
    // Evitamos que el clic en el botón active el sobre por error
    if(event) event.stopPropagation();
    
    if (musica.paused) {
        musica.play();
        musicBtn.classList.add("playing");
    } else {
        musica.pause();
        musicBtn.classList.remove("playing");
    }
}
        // Función para pausar y reanudar
function toggleMusic(event) {
    // Evita que el clic se propague al sobre o al fondo
    if(event) event.stopPropagation();
    
    if (musica.paused) {
        musica.play();
        musicBtn.classList.add("playing"); // Activa las barras animadas
    } else {
        musica.pause();
        musicBtn.classList.remove("playing"); // Detiene las barras animadas
    }
}
        function iniciarApertura() {
            const sobre = document.getElementById('miSobre');
            const inicio = document.getElementById('pantalla-inicio');
            const invitacion = document.getElementById('invitacion-real');

            const musica = document.getElementById("musicaBoda");
const musicIcon = document.getElementById("music-icon");
const musicBtn = document.getElementById("music-control");

                
            // 1. Efecto visual de apertura (gira solapa, quita sello)
            sobre.classList.add('open');
            
// 2. Iniciamos la música al hacer clic
    musica.play().then(() => {
        musicBtn.classList.add("playing");
    }).catch(err => console.log("Autoplay bloqueado, el usuario debe usar el botón"));

           
            // 2. Transición a la invitación
                setTimeout(() => {
        document.getElementById('pantalla-inicio').style.opacity = '0';
        // ... resto del código
    }, 2000);
            setTimeout(() => {
                inicio.style.opacity = '0';
                setTimeout(() => {
                    inicio.style.display = 'none';
                    invitacion.style.display = 'flex';
                    
                    // Pequeño delay para el fade in de la invitación
                    setTimeout(() => {
                        invitacion.style.opacity = '1';
                        window.scrollTo(0, 0); // Asegura empezar arriba
                        AOS.init({ duration: 1200, mirror: true });
                        document.body.style.overflowY = "auto";
                    }, 100);
                }, 800);
            }, 1000); // Damos un poco más de tiempo para ver la solapa abrirse
        }

        // Bloqueo inicial
        window.onload = () => {
            document.body.style.overflowY = "hidden";
        };
        
    </script>
    <script>
        // CONFIGURA TU FECHA AQUÍ (Formato: Mes Día, Año Hora:Min:Seg)
const fechaBoda = new Date("Dec 26, 2026 15:00:00").getTime();

const interval = setInterval(function() {
    const ahora = new Date().getTime();
    const distancia = fechaBoda - ahora;

    // Cálculos de tiempo
    const d = Math.floor(distancia / (1000 * 60 * 60 * 24));
    const h = Math.floor((distancia % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const m = Math.floor((distancia % (1000 * 60 * 60)) / (1000 * 60));
    const s = Math.floor((distancia % (1000 * 60)) / 1000);

    // Inyectar en el HTML
    document.getElementById("days").innerText = d < 10 ? "0" + d : d;
    document.getElementById("hours").innerText = h < 10 ? "0" + h : h;
    document.getElementById("minutes").innerText = m < 10 ? "0" + m : m;
    document.getElementById("seconds").innerText = s < 10 ? "0" + s : s;

    // Si la fecha ya pasó
    if (distancia < 0) {
        clearInterval(interval);
        document.getElementById("countdown").innerHTML = "<h3>¡Llegó el gran día!</h3>";
    }
}, 1000);
    </script>
</body>
</html>
