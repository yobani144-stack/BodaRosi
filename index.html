<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitación de Boda</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>

    <div class="wrapper" data-aos="fade-up">
        
        <div class="envelope" id="invitation">
            <div class="flap"></div>
            
            <div class="letter">
                <h1>Nuestra Boda</h1>
                <p>Estás cordialmente invitado a celebrar el inicio de nuestra historia.</p>
                <p><strong>Mariana & Alejandro</strong></p>
                <p style="font-size: 0.8rem;">26.12.2026</p>
            </div>
            
            <div class="pocket"></div>
        </div>

        <div class="tap-hint">Haz clic para abrir</div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        // Inicializar animaciones AOS
        AOS.init({
            duration: 1000,
            once: false,
            mirror: true,
            offset: 100
        });

        // Lógica para abrir/cerrar el sobre al hacer clic
        const inv = document.getElementById('invitation');
        inv.addEventListener('click', () => {
            inv.classList.toggle('open');
        });

        // Refrescar AOS para asegurar compatibilidad con Google Sites
        window.addEventListener('load', () => {
            setTimeout(() => { AOS.refresh(); }, 200);
        });
    </script>
</body>
</html>
