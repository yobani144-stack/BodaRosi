<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitación Especial</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">
</head>
<body>

    <section id="seccion-sobre">
    <div class="wrapper-sobre" onclick="abrirInvitacion()">
        <div class="flap"></div>
        <div class="letter-preview"><h2>Tocar para abrir</h2></div>
        <div class="pocket"></div>
    </div>
</section>

<section id="seccion-contenido">

    <div class="invitation-main" data-aos="fade-up">
        <h1>Mariana & Alejandro</h1>
        <p>¡Nos Casamos!</p>
    </div>

    <div class="card-perspective" data-aos="fade-up">
        <div class="card-inner" id="cardInner">
            </div>
    </div>

    <div class="boton-container" data-aos="fade-up">
        <a href="#" class="btn-whatsapp">Confirmar en WhatsApp</a>
    </div>

</section>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

    <script>
        // AQUÍ VA EL CÓDIGO QUE TE PASÉ
        function abrirInvitacion() {
            const sobre = document.getElementById('seccion-sobre');
            const contenido = document.getElementById('seccion-contenido');

            // 1. Inicia la animación visual del sobre
            sobre.classList.add('open');

            // 2. Espera a que termine la animación para cambiar de sección
            setTimeout(() => {
                sobre.style.display = 'none'; // Quita el sobre del camino
                contenido.classList.add('show'); // Muestra la invitación
                
                // Habilitamos el scroll para que el invitado pueda bajar
                document.body.style.overflowY = "auto";
                
                // Refrescamos las animaciones de las tarjetas y fotos
                AOS.init(); 
                AOS.refresh();
            }, 1200);
        }

        // Bloqueo inicial: Para que no puedan bajar sin abrir el sobre
        window.onload = () => {
            document.body.style.overflowY = "hidden";
            window.scrollTo(0, 0);
        };
    </script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        // 1. Inicializar animaciones de scroll
        AOS.init({
            duration: 1000,
            once: false,   // Clave: permite que reaparezca al subir o bajar
            mirror: true,  // Clave: anima mientras sales de la pantalla
            offset: 100
        });

        // 2. Lógica para el giro al hacer clic o tocar
        const container = document.getElementById('cardContainer');
        const inner = document.getElementById('cardInner');

        container.addEventListener('click', () => {
            inner.classList.toggle('is-flipped');
        });

        // Refrescar AOS para Google Sites
        window.addEventListener('load', () => {
            setTimeout(() => { AOS.refresh(); }, 200);
        });
    </script>

    
</body>
</html>
