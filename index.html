<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boda - Invitación Interactiva</title>
    
    <link rel="stylesheet" href="style.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bloqueado">

    <section id="pantalla-inicio">
        <div class="envelope" id="miSobre" onclick="iniciarApertura()">
            <div class="flap"></div>
            <div style="position: absolute; width:100%; height:100%; display:flex; justify:center; align-items:center; color:white; font-size: 0.8rem; letter-spacing:2px;">
                TOCAR PARA ABRIR
            </div>
        </div>
    </section>

    <main id="invitacion-real">
        
        <section class="bloque" data-aos="fade-up">
            <h1>Nombre & Nombre</h1>
            <p>¡NOS CASAMOS!</p>
        </section>

        </main>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        function iniciarApertura() {
            const sobre = document.getElementById('miSobre');
            const inicio = document.getElementById('pantalla-inicio');
            const invitacion = document.getElementById('invitacion-real');

            // 1. Efecto visual de apertura
            sobre.classList.add('open');

            // 2. Transición a la invitación
            setTimeout(() => {
                inicio.style.opacity = '0';
                setTimeout(() => {
                    inicio.style.display = 'none';
                    invitacion.style.display = 'flex';
                    
                    // Pequeño delay para el fade in de la invitación
                    setTimeout(() => {
                        invitacion.style.opacity = '1';
                        AOS.init({ duration: 1000, mirror: true });
                        document.body.style.overflowY = "auto";
                    }, 100);
                }, 800);
            }, 800);
        }

        // Bloqueo inicial
        window.onload = () => {
            document.body.style.overflowY = "hidden";
        };
    </script>
</body>
</html>
