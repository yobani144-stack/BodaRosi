<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boda - Invitación Premium</title>
    
    <link rel="stylesheet" href="style.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>
<body>

    <section id="pantalla-inicio">
        <div class="envelope" id="miSobre" onclick="iniciarApertura()">
            
            <div class="envelope-base"></div>
            
            <div class="flap"></div>
            
            <div class="stamp"></div>
            
            <div class="click-to-open">TOCAR PARA ABRIR</div>
            
        </div>
    </section>

    <main id="invitacion-real">
        
        <section class="bloque" data-aos="fade-up">
            <h1>Mariana & Alejandro</h1>
            <p style="letter-spacing: 4px; font-weight: 300;">¡NOS CASAMOS!</p>
        </section>

        </main>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        function iniciarApertura() {
            const sobre = document.getElementById('miSobre');
            const inicio = document.getElementById('pantalla-inicio');
            const invitacion = document.getElementById('invitacion-real');

            // 1. Efecto visual de apertura (gira solapa, quita sello)
            sobre.classList.add('open');

            // 2. Transición a la invitación
            setTimeout(() => {
                inicio.style.opacity = '0';
                setTimeout(() => {
                    inicio.style.display = 'none';
                    invitacion.style.display = 'flex';
                    
                    // Pequeño delay para el fade in de la invitación
                    setTimeout(() => {
                        invitacion.style.opacity = '1';
                        window.scrollTo(0, 0); // Asegura empezar arriba
                        AOS.init({ duration: 1200, mirror: true });
                        document.body.style.overflowY = "auto";
                    }, 100);
                }, 800);
            }, 1000); // Damos un poco más de tiempo para ver la solapa abrirse
        }

        // Bloqueo inicial
        window.onload = () => {
            document.body.style.overflowY = "hidden";
        };
    </script>
</body>
</html>
